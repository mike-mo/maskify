<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maskify</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #e8e8e8;
    }

    .header img {
      width: 20px;
      height: 20px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.1px;
    }

    .body {
      padding: 14px 16px 16px;
    }

    .description {
      color: #555;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 8px 16px;
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.1s;
    }

    button:hover  { background: #106ebe; }
    button:active { background: #005a9e; }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/maskify32x32.png" alt="" />
    <h1>Maskify</h1>
  </div>
  <div class="body">
    <p class="description">Replace all email addresses on this page with randomly generated fake ones.</p>
    <button id="sendmessageid">Mask Emails</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
