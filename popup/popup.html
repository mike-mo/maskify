<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maskify</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #e8e8e8;
    }

    .header img {
      width: 20px;
      height: 20px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.1px;
    }

    .body {
      padding: 14px 16px 16px;
    }

    .description {
      color: #555;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 6px;
    }

    .domain-input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      color: #1a1a1a;
      outline: none;
    }

    .domain-input:focus {
      border-color: #0078d4;
    }

    .domain-input.invalid,
    .domain-input.invalid:focus {
      border-color: #d93025;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 8px 16px;
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.1s;
    }

    button:hover  { background: #106ebe; }
    button:active { background: #005a9e; }

    .donate-link {
      display: block;
      margin-top: 10px;
      text-align: center;
      font-size: 11px;
      color: #595959;
      text-decoration: none;
    }

    .donate-link:hover { color: #333; }

    .preview {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 7px 10px;
      background: #f5f5f5;
      border-radius: 4px;
    }

    .preview-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: #888;
      flex-shrink: 0;
    }

    .preview code {
      font-size: 12px;
      color: #0078d4;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/maskify32x32.png" alt="" />
    <h1 id="popupTitle">Maskify</h1>
  </div>
  <div class="body">
    <p id="popupDescription" class="description">Replace all email addresses on this page with masked addresses.</p>
    <div class="field">
      <label id="labelDomain" class="field-label" for="domainInput">Domain</label>
      <input type="text" id="domainInput" class="domain-input" placeholder="example.com" />
    </div>
    <div class="field">
      <label class="checkbox-label">
        <input type="checkbox" id="addNumber" />
        <span id="labelAddNumber">Add number (e.g. alice<strong>7</strong>)</span>
      </label>
    </div>
    <div class="field">
      <label class="checkbox-label">
        <input type="checkbox" id="addLastInitial" />
        <span id="labelAddLastInitial">Add last initial (e.g. alice<strong>_r</strong>)</span>
      </label>
    </div>
    <div class="field">
      <label class="checkbox-label">
        <input type="checkbox" id="showAsterisk" />
        <span id="labelShowAsterisk">Mark replacements with ***</span>
      </label>
    </div>
    <div class="preview">
      <span id="labelPreview" class="preview-label">Preview</span>
      <code id="previewAddress"></code>
    </div>
    <button id="sendmessageid">Mask Emails</button>
    <a id="donateLink" class="donate-link" href="https://donate.stripe.com/3cIeVd8iSbCo2VGeKxenS01" target="_blank" rel="noopener noreferrer">Buy me a coffee ☕</a>
  </div>
  <script src="../data/domain-utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
