name: Publish to Edge Add-ons

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          MANIFEST_VERSION=$(jq -r '.version' manifest.json)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: manifest=$MANIFEST_VERSION, tag=$TAG_VERSION"
            exit 1
          fi
          echo "Version check passed: $MANIFEST_VERSION"

      - name: Build maskify.zip
        run: |
          zip -r maskify.zip \
            manifest.json \
            _locales/ \
            popup/ \
            content-scripts/ \
            data/ \
            icons/maskify16x16.png \
            icons/maskify32x32.png \
            icons/maskify48x48.png \
            icons/maskify128x128.png

      - name: Attach maskify.zip to release
        run: gh release upload ${{ github.ref_name }} maskify.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check BPP_KEYS secret
        id: check_secret
        run: |
          if [ -n "$BPP_KEYS" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "BPP_KEYS secret not set — skipping Edge publish"
          fi
        env:
          BPP_KEYS: ${{ secrets.BPP_KEYS }}

      - name: Publish to Edge Add-ons Store
        if: steps.check_secret.outputs.available == 'true'
        uses: PlasmoHQ/bpp@v3
        with:
          artifact: maskify.zip
          keys: ${{ secrets.BPP_KEYS }}
